<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D CBS | Yönetim Paneli - Live Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <!-- Access Key Overlay -->
    <div id="access-overlay"
        style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:9999;display:flex;justify-content:center;align-items:center;">
        <div
            style="background:rgba(30,41,59,0.8);padding:2rem;border-radius:12px;border:1px solid rgba(255,255,255,0.1);text-align:center;backdrop-filter:blur(10px);">
            <h2 style="color:#fff;margin-bottom:1.5rem;">Yönetici Girişi</h2>
            <input type="password" id="admin-key" placeholder="Erişim Anahtarı"
                style="background:rgba(0,0,0,0.3);border:1px solid #38bdf8;padding:0.8rem;border-radius:6px;color:#fff;margin-bottom:1rem;display:block;width:200px;">
            <button onclick="checkAccess()"
                style="background:#38bdf8;color:#000;border:none;padding:0.8rem 2rem;border-radius:6px;cursor:pointer;font-weight:600;">Giriş
                Yap</button>
            <p id="access-error" style="color:#ef4444;margin-top:1rem;font-size:0.8rem;display:none;">Hatalı Anahtar!
            </p>
        </div>
    </div>

    <div class="admin-container" id="admin-content" style="display:none;">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>Canlı İzleme Paneli</h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item">Aktif Oturumlar: <span id="session-count">0</span></div>
                <div class="stat-item">Hata Oranı: <span id="error-rate">0%</span></div>
            </div>
        </header>

        <section id="map-section" style="height: 300px; border-bottom: 1px solid var(--border); position: relative;">
            <div id="map" style="height: 100%; width: 100%;"></div>
            <div class="map-overlay"
                style="position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; color: #fff; pointer-events: none;">
                🟢 Aktif &nbsp; ⚪ Pasif &nbsp; ⚠️ Hatalı
            </div>
        </section>

        <main>
            <aside class="sidebar">
                <h3>Oturumlar</h3>
                <div class="search-box">
                    <input type="text" id="session-search" placeholder="Session ID Ara...">
                </div>
                <ul id="session-list">
                    <!-- Session items will be injected here -->
                </ul>
            </aside>

            <section class="log-viewer">
                <div class="viewer-header">
                    <h2 id="current-session-title">Genel Akış (Tüm Oturumlar)</h2>
                    <button id="clear-logs" class="btn-secondary">Temizle</button>
                </div>

                <div class="log-table-container">
                    <table id="log-table">
                        <thead>
                            <tr>
                                <th>Zaman</th>
                                <th>Kaynak</th>
                                <th>Oturum</th>
                                <th>Eylem</th>
                                <th>Sistem / FPS</th>
                                <th>Detay</th>
                            </tr>
                        </thead>
                        <tbody id="log-body">
                            <!-- Logs will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <aside class="details-panel" id="details-panel">
                <h3>Sistem Detayları</h3>
                <div id="system-details-content">
                    <p class="placeholder">Bir log seçerek detayları görüntüleyin.</p>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://qnobscsbcsrhizqcraif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VmFm70pf-3g3xDfXNBxcpw_ji_Dj-Ee';
        const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let sessions = new Set();
        let logs = [];
        let selectedSession = null;
        let map, markers = {};

        window.checkAccess = function (manualKey) {
            const key = manualKey || document.getElementById('admin-key').value;
            if (key === 'bursa16') {
                localStorage.setItem('adminKey', key);
                document.getElementById('access-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'flex';

                // Haritayı başlat
                setTimeout(initMap, 100);
                init();
            } else if (!manualKey) {
                document.getElementById('access-error').style.display = 'block';
            }
        };

        function initMap() {
            map = L.map('map').setView([40.1885, 29.0610], 12); // Bursa merkez
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        // Otomatik giriş kontrolü
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('adminKey');
            if (savedKey) checkAccess(savedKey);
        });

        async function init() {
            // Mevcut verileri çek
            const { data, error } = await supabaseAdmin
                .from('telemetry_logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);

            if (data) {
                data.reverse().forEach(log => addLogToUI(log));
            }

            // Realtime dinle
            supabaseAdmin
                .channel('telemetry_logs')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'telemetry_logs' }, payload => {
                    addLogToUI(payload.new);
                })
                .subscribe();
        }

        function addLogToUI(log) {
            logs.push(log);
            sessions.add(log.session_id);
            updateSessionList();

            if (selectedSession && log.session_id !== selectedSession) return;

            const tbody = document.getElementById('log-body');
            const tr = document.createElement('tr');
            if (log.is_error) tr.classList.add('error-row');

            const time = new Date(log.created_at).toLocaleTimeString();
            const fpsColor = log.fps < 30 ? '#ff4d4d' : (log.fps < 50 ? '#ffcc00' : '#00ff88');
            const sourceClass = log.system_info?.source === 'Local' ? 'badge-local' : 'badge-live';

            tr.innerHTML = `
                <td>${time}</td>
                <td><span class="badge ${sourceClass}">${log.system_info?.source || 'N/A'}</span></td>
                <td class="session-cell" title="${log.session_id}">${log.session_id.substring(8, 16)}...</td>
                <td><strong>${log.action}</strong></td>
                <td><span style="color:${fpsColor}">${log.fps} FPS</span> | ${log.system_info?.gpu?.split('(')[0] || 'N/A'}</td>
                <td><button class="btn-info" onclick='showDetails(${JSON.stringify(log)})'>🔍 İncele</button></td>
            `;

            tbody.insertBefore(tr, tbody.firstChild);

            // Limit UI items
            if (tbody.children.length > 200) tbody.removeChild(tbody.lastChild);

            document.getElementById('session-count').innerText = sessions.size;
            updateErrorRate();
            updateMarkers(log);
        }

        function updateMarkers(log) {
            if (!map || !log.system_info?.location) return;

            const loc = log.system_info.location;
            const sid = log.session_id;

            // Son aktiflik zamanını kontrol et (1 dakika pasifse gri yap)
            const isPassive = (new Date() - new Date(log.created_at)) > 60000;
            const color = log.is_error ? '#ef4444' : (isPassive ? '#94a3b8' : '#22c55e');

            if (markers[sid]) {
                markers[sid].setLatLng([loc.lat, loc.lng]);
                markers[sid].setStyle({ color: color, fillColor: color });
            } else {
                markers[sid] = L.circleMarker([loc.lat, loc.lng], {
                    radius: 8,
                    fillColor: color,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);

                markers[sid].bindPopup(`<b>Oturum:</b> ${sid.substring(8, 16)}...<br><b>Eylem:</b> ${log.action}`);
                markers[sid].on('click', () => filterSession(sid));
            }
        }

        function filterSession(sid) {
            selectedSession = sid;
            document.getElementById('current-session-title').innerText = sid ? `Oturum: ${sid}` : 'Genel Akış (Tüm Oturumlar)';
            document.getElementById('log-body').innerHTML = '';

            // Mevcut logları temizle ve filtreye göre yeniden ekle (En yeni en üstte)
            const filteredLogs = logs
                .filter(l => !sid || l.session_id === sid)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            filteredLogs.forEach(l => {
                const tbody = document.getElementById('log-body');
                const tr = document.createElement('tr');
                if (l.is_error) tr.classList.add('error-row');

                const time = new Date(l.created_at).toLocaleTimeString();
                const fpsColor = l.fps < 30 ? '#ff4d4d' : (l.fps < 50 ? '#ffcc00' : '#00ff88');
                const sourceClass = l.system_info?.source === 'Local' ? 'badge-local' : 'badge-live';

                tr.innerHTML = `
                    <td>${time}</td>
                    <td><span class="badge ${sourceClass}">${l.system_info?.source || 'N/A'}</span></td>
                    <td class="session-cell" title="${l.session_id}">${l.session_id.substring(8, 16)}...</td>
                    <td><strong>${l.action}</strong></td>
                    <td><span style="color:${fpsColor}">${l.fps} FPS</span> | ${l.system_info?.gpu?.split('(')[0] || 'N/A'}</td>
                    <td><button class="btn-info" onclick='showDetails(${JSON.stringify(l)})'>🔍 İncele</button></td>
                `;
                tbody.appendChild(tr);
            });
            updateSessionList();
        }

        function updateSessionList() {
            const list = document.getElementById('session-list');
            list.innerHTML = `<li class="${!selectedSession ? 'active' : ''}" onclick="filterSession(null)">🌐 Tüm Akış</li>`;

            // Oturumları haritalandır (son durumu ve hata var mı bilgisini tut)
            const sessionMap = {};
            logs.forEach(l => {
                if (!sessionMap[l.session_id]) {
                    sessionMap[l.session_id] = { hasError: false, lastSeen: l.created_at };
                }
                if (l.is_error) sessionMap[l.session_id].hasError = true;
                if (new Date(l.created_at) > new Date(sessionMap[l.session_id].lastSeen)) {
                    sessionMap[l.session_id].lastSeen = l.created_at;
                }
            });

            Object.keys(sessionMap).sort((a, b) => new Date(sessionMap[b].lastSeen) - new Date(sessionMap[a].lastSeen)).forEach(sid => {
                const li = document.createElement('li');
                li.className = sid === selectedSession ? 'active' : '';
                const statusIcon = sessionMap[sid].hasError ? '⚠️' : '👤';
                li.innerHTML = `${statusIcon} ${sid.substring(8, 20)}...`;
                li.onclick = () => filterSession(sid);
                list.appendChild(li);
            });
        }

        const ERROR_DICTIONARY = {
            'Uncaught ReferenceError': { tr: 'Tanımlanmamış Değişken Hatası', solution: 'Kod içerisinde var olmayan bir değişkene erişilmeye çalışılıyor. Değişkenin tanımlandığından emin olun.' },
            'Uncaught TypeError': { tr: 'Tip Hatası', solution: 'Null veya undefined bir değer üzerinde işlem yapılmaya çalışılıyor. (örn: obj.prop yazarken obj null olabilir)' },
            'Failed to fetch': { tr: 'Ağ Bağlantı Hatası', solution: 'API veya veritabanı sunucusuna erişilemiyor. İnternet bağlantısını veya servis durumunu kontrol edin.' },
            'Cesium failed to load': { tr: 'Cesium Yükleme Hatası', solution: '3D motoru dosyaları yüklenemedi. Asset yollarını veya token süresini kontrol edin.' },
            'QuotaExceededError': { tr: 'Depolama Dolu', solution: 'Tarayıcı yerel depolama alanı dolmuş. Kayıtlı verileri temizlemeyi deneyin.' }
        };

        function getTurkishError(msg) {
            for (let key in ERROR_DICTIONARY) {
                if (msg.includes(key)) return ERROR_DICTIONARY[key];
            }
            return { tr: 'Bilinmeyen Hata', solution: 'Lütfen hata detaylarındaki "stack" bilgisini teknik ekibe iletin.' };
        }

        window.showDetails = function (log) {
            const panel = document.getElementById('system-details-content');
            const errorInfo = log.is_error ? getTurkishError(log.details.message || '') : null;

            panel.innerHTML = `
                <div class="detail-group">
                    <div class="source-header">
                        <span class="badge ${log.system_info?.source === 'Local' ? 'badge-local' : 'badge-live'}">${log.system_info?.source}</span>
                        <span>${log.system_info?.host}</span>
                    </div>
                </div>

                ${log.is_error ? `
                <div class="error-analysis active">
                    <h4>⚠️ Hata Analizi (Türkçe)</h4>
                    <p><strong>Hata Türü:</strong> ${errorInfo.tr}</p>
                    <p><strong>Açıklama:</strong> ${log.details.message}</p>
                    <div class="solution-box">
                        <strong>💡 Çözüm Önerisi:</strong><br>${errorInfo.solution}
                    </div>
                </div>
                ` : ''}

                <div class="detail-group">
                    <h4>Eylem Detayı</h4>
                    <pre>${JSON.stringify(log.details, null, 2)}</pre>
                </div>

                <div class="detail-group">
                    <h4>Sistem Bilgisi</h4>
                    <div class="info-grid">
                        <div class="info-item"><span>Platform</span><strong>${log.system_info?.platform}</strong></div>
                        <div class="info-item"><span>Ekran</span><strong>${log.system_info?.screen}</strong></div>
                        <div class="info-item"><span>GPU</span><strong>${log.system_info?.gpu?.substring(0, 30)}...</strong></div>
                        <div class="info-item"><span>Bellek</span><strong>${log.system_info?.memory}</strong></div>
                    </div>
                </div>
            `;
        };

        function updateErrorRate() {
            const errorCount = logs.filter(l => l.is_error).length;
            const rate = logs.length > 0 ? ((errorCount / logs.length) * 100).toFixed(1) : 0;
            document.getElementById('error-rate').innerText = rate + '%';
        }

        init();
    </script>
</body>

</html>
